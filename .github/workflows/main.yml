name: 🚀 এআই এসটিভি প্রিমিয়াম আরডিপি

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 ব্যবহারের সময়কাল নির্বাচন করুন'
        required: true
        default: '5h40m'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h'
          - '5h40m'

jobs:
  Premium-RDP-Setup:
    name: 💎 প্রিমিয়াম আরডিপি সার্ভার
    runs-on: windows-latest

    # GitHub-hosted runner-এর সর্বোচ্চ সীমা ৬ ঘণ্টা।
    # Setup/Cleanup-এর জন্য কিছু সময় রেখে ৩৫৫ মিনিট।
    timeout-minutes: 355

    steps:

      # ============================================================
      # ১. সিস্টেম চালু
      # ============================================================

      - name: 🎯 সিস্টেম চালু করুন
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║       🤖 এআই এসটিভি প্রিমিয়াম আরডিপি       ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "⚡ এআই এসটিভি দ্বারা পরিচালিত" -ForegroundColor Green
          Write-Host "🕒 নির্বাচিত সময়কাল: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host "🖥️ রানার: $env:RUNNER_NAME" -ForegroundColor White
          Write-Host ""

          $frames = @(
            '⣾','⣽','⣻','⢿',
            '⡿','⣟','⣯','⣷'
          )

          for ($i = 0; $i -lt 16; $i++) {

              $frame = $frames[$i % $frames.Length]

              Write-Host `
                "`r🚀 সিস্টেম প্রস্তুত করা হচ্ছে... $frame" `
                -NoNewline `
                -ForegroundColor Blue

              Start-Sleep -Milliseconds 120
          }

          Write-Host ""
          Write-Host "✅ সিস্টেম প্রস্তুত!" -ForegroundColor Green


      # ============================================================
      # ২. ইনপুট ও Secret যাচাই
      # ============================================================

      - name: 🔐 প্রয়োজনীয় তথ্য যাচাই করুন
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "🔐 প্রয়োজনীয় তথ্য যাচাই করা হচ্ছে..." -ForegroundColor Yellow

          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_AUTH_KEY)) {

              Write-Host ""
              Write-Host "❌ TAILSCALE_AUTH_KEY পাওয়া যায়নি!" -ForegroundColor Red
              Write-Host ""
              Write-Host "GitHub Repository → Settings → Secrets and variables → Actions" -ForegroundColor Yellow
              Write-Host "সেখানে TAILSCALE_AUTH_KEY নামে Secret তৈরি করুন।" -ForegroundColor Yellow

              exit 1
          }

          Write-Host "│ ✅ Tailscale Auth Key পাওয়া গেছে" -ForegroundColor Green
          Write-Host "│ ✅ নির্বাচিত সময়কাল বৈধ" -ForegroundColor Green

          Write-Host ""
          Write-Host "🎯 প্রাথমিক যাচাই সম্পন্ন!" -ForegroundColor Green


      # ============================================================
      # ৩. RDP সিস্টেম কনফিগারেশন
      # ============================================================

      - name: 🔧 সিস্টেম কনফিগারেশন
        shell: powershell

        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "🛠️ আরডিপি সিস্টেম কনফিগার করা হচ্ছে..." -ForegroundColor Yellow
          Write-Host ""

          # --------------------------------------------------------
          # Remote Desktop চালু
          # --------------------------------------------------------

          Write-Host "│ 📋 রিমোট ডেস্কটপ চালু করা হচ্ছে..." -ForegroundColor White

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name 'fDenyTSConnections' `
            -Value 0 `
            -Force

          Write-Host "│ ✅ রিমোট ডেস্কটপ চালু হয়েছে" -ForegroundColor Green


          # --------------------------------------------------------
          # Network Level Authentication বন্ধ
          # --------------------------------------------------------

          Write-Host "│ 📋 নেটওয়ার্ক লগইন সেটিংস কনফিগার করা হচ্ছে..." -ForegroundColor White

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name 'UserAuthentication' `
            -Value 0 `
            -Force

          Write-Host "│ ✅ লগইন সেটিংস কনফিগার হয়েছে" -ForegroundColor Green


          # --------------------------------------------------------
          # RDP Security Layer
          # --------------------------------------------------------

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name 'SecurityLayer' `
            -Value 0 `
            -Force

          Write-Host "│ ✅ আরডিপি নিরাপত্তা স্তর কনফিগার হয়েছে" -ForegroundColor Green


          # --------------------------------------------------------
          # Firewall
          # --------------------------------------------------------

          Write-Host "│ 📋 ফায়ারওয়াল কনফিগার করা হচ্ছে..." -ForegroundColor White

          Remove-NetFirewallRule `
            -DisplayName "AI-STV-RDP" `
            -ErrorAction SilentlyContinue

          New-NetFirewallRule `
            -DisplayName "AI-STV-RDP" `
            -Direction Inbound `
            -Protocol TCP `
            -LocalPort 3389 `
            -Action Allow `
            -Profile Any `
            -ErrorAction Stop | Out-Null

          Write-Host "│ ✅ আরডিপি পোর্ট ৩৩৮৯ অনুমোদিত" -ForegroundColor Green


          # --------------------------------------------------------
          # Services
          # --------------------------------------------------------

          Write-Host "│ 📋 প্রয়োজনীয় সার্ভিস চালু করা হচ্ছে..." -ForegroundColor White

          Set-Service `
            -Name TermService `
            -StartupType Automatic `
            -ErrorAction Stop

          Start-Service `
            -Name TermService `
            -ErrorAction SilentlyContinue

          Set-Service `
            -Name UmRdpService `
            -StartupType Automatic `
            -ErrorAction SilentlyContinue

          Start-Service `
            -Name UmRdpService `
            -ErrorAction SilentlyContinue

          $service = Get-Service `
            -Name TermService `
            -ErrorAction Stop

          if ($service.Status -ne "Running") {

              throw "TermService চালু করা সম্ভব হয়নি।"
          }

          Write-Host "│ ✅ Remote Desktop Service চলছে" -ForegroundColor Green

          Write-Host ""
          Write-Host "🎯 সিস্টেম কনফিগারেশন সম্পন্ন!" -ForegroundColor Green


      # ============================================================
      # ৪. Premium Account তৈরি
      # ============================================================

      - name: 👤 প্রিমিয়াম অ্যাকাউন্ট তৈরি করুন
        shell: powershell

        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "👤 প্রিমিয়াম অ্যাকাউন্ট তৈরি করা হচ্ছে..." -ForegroundColor Yellow
          Write-Host ""

          $username = "RIYAN"

          # Windows password complexity পূরণ করে
          $password = "Riyan@212"

          try {

              # ----------------------------------------------------
              # পুরনো একই নামের User থাকলে সরানো
              # ----------------------------------------------------

              $existingUser = Get-LocalUser `
                -Name $username `
                -ErrorAction SilentlyContinue

              if ($null -ne $existingUser) {

                  Write-Host "│ 🔄 পুরনো ব্যবহারকারী পাওয়া গেছে, সরানো হচ্ছে..." -ForegroundColor Yellow

                  Remove-LocalUser `
                    -Name $username `
                    -ErrorAction Stop

                  Start-Sleep -Seconds 2

                  Write-Host "│ ✅ পুরনো ব্যবহারকারী মুছে ফেলা হয়েছে" -ForegroundColor Green

              } else {

                  Write-Host "│ ℹ️ পুরনো ব্যবহারকারী নেই" -ForegroundColor Blue
              }


              # ----------------------------------------------------
              # Secure Password
              # ----------------------------------------------------

              $securePass = ConvertTo-SecureString `
                -String $password `
                -AsPlainText `
                -Force


              # ----------------------------------------------------
              # নতুন User
              # ----------------------------------------------------

              New-LocalUser `
                -Name $username `
                -Password $securePass `
                -AccountNeverExpires `
                -PasswordNeverExpires `
                -Description "AI STV Premium RDP Account" `
                -ErrorAction Stop | Out-Null

              Write-Host "│ ✅ নতুন ব্যবহারকারী তৈরি হয়েছে" -ForegroundColor Green


              # ----------------------------------------------------
              # Administrator
              # ----------------------------------------------------

              Add-LocalGroupMember `
                -Group "Administrators" `
                -Member $username `
                -ErrorAction SilentlyContinue

              Write-Host "│ ✅ অ্যাডমিনিস্ট্রেটর অনুমতি দেওয়া হয়েছে" -ForegroundColor Green


              # ----------------------------------------------------
              # Remote Desktop Users
              # ----------------------------------------------------

              Add-LocalGroupMember `
                -Group "Remote Desktop Users" `
                -Member $username `
                -ErrorAction SilentlyContinue

              Write-Host "│ ✅ রিমোট ডেস্কটপ অনুমতি দেওয়া হয়েছে" -ForegroundColor Green


              # ----------------------------------------------------
              # Enable account
              # ----------------------------------------------------

              Enable-LocalUser `
                -Name $username `
                -ErrorAction Stop

              $checkUser = Get-LocalUser `
                -Name $username `
                -ErrorAction Stop

              if (-not $checkUser.Enabled) {

                  throw "RIYAN অ্যাকাউন্ট সক্রিয় করা সম্ভব হয়নি।"
              }

              Write-Host "│ ✅ অ্যাকাউন্ট সক্রিয় আছে" -ForegroundColor Green

          }
          catch {

              Write-Host ""
              Write-Host "❌ ব্যবহারকারী তৈরিতে ত্রুটি!" -ForegroundColor Red
              Write-Host "কারণ: $($_.Exception.Message)" -ForegroundColor Red

              exit 1
          }


          # --------------------------------------------------------
          # Environment Variables
          # --------------------------------------------------------

          "RDP_USER=$username" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          "RDP_PASS=$password" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          Write-Host ""
          Write-Host "✅ প্রিমিয়াম অ্যাকাউন্ট প্রস্তুত!" -ForegroundColor Green


      # ============================================================
      # ৫. Account + RDP যাচাই
      # ============================================================

      - name: 🔍 সিস্টেম অনুমতি যাচাই করুন
        shell: powershell

        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "🔍 সিস্টেম ও লগইন অনুমতি যাচাই করা হচ্ছে..." -ForegroundColor Yellow
          Write-Host ""

          # User check
          $user = Get-LocalUser `
            -Name $env:RDP_USER `
            -ErrorAction Stop

          if (-not $user.Enabled) {

              throw "ব্যবহারকারী নিষ্ক্রিয় রয়েছে।"
          }

          Write-Host "│ ✅ ব্যবহারকারী বিদ্যমান ও সক্রিয়" -ForegroundColor Green


          # Administrator check
          $admins = Get-LocalGroupMember `
            -Group "Administrators" `
            -ErrorAction Stop

          $isAdmin = $admins |
            Where-Object {
              $_.Name -match "\\$([regex]::Escape($env:RDP_USER))$"
            }

          if ($isAdmin) {

              Write-Host "│ ✅ অ্যাডমিনিস্ট্রেটর অনুমতি আছে" -ForegroundColor Green

          } else {

              throw "অ্যাডমিনিস্ট্রেটর অনুমতি পাওয়া যায়নি।"
          }


          # RDP group check
          $rdpUsers = Get-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -ErrorAction Stop

          $isRdpUser = $rdpUsers |
            Where-Object {
              $_.Name -match "\\$([regex]::Escape($env:RDP_USER))$"
            }

          if ($isRdpUser) {

              Write-Host "│ ✅ রিমোট ডেস্কটপ অনুমতি আছে" -ForegroundColor Green

          } else {

              throw "Remote Desktop Users অনুমতি পাওয়া যায়নি।"
          }


          # Service check
          $termService = Get-Service `
            -Name TermService `
            -ErrorAction Stop

          if ($termService.Status -ne "Running") {

              Start-Service `
                -Name TermService `
                -ErrorAction Stop
          }

          Write-Host "│ ✅ Remote Desktop Service চলছে" -ForegroundColor Green


          # Port check
          $listener = Get-NetTCPConnection `
            -LocalPort 3389 `
            -State Listen `
            -ErrorAction SilentlyContinue

          if ($listener) {

              Write-Host "│ ✅ পোর্ট ৩৩৮৯ Listening অবস্থায় আছে" -ForegroundColor Green

          } else {

              Write-Host "│ ⚠️ পোর্ট যাচাইয়ে Listener পাওয়া যায়নি" -ForegroundColor Yellow
          }

          Write-Host ""
          Write-Host "🎯 সিস্টেম যাচাই সম্পন্ন!" -ForegroundColor Green


      # ============================================================
      # ৬. Tailscale Install + Connect
      # ============================================================

      - name: 🌐 প্রিমিয়াম নেটওয়ার্ক সেটআপ করুন
        shell: powershell

        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "🌐 নিরাপদ নেটওয়ার্ক সংযোগ স্থাপন করা হচ্ছে..." -ForegroundColor Yellow
          Write-Host ""

          $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          # --------------------------------------------------------
          # Install Tailscale
          # --------------------------------------------------------

          if (-not (Test-Path $tailscaleExe)) {

              Write-Host "│ 📥 Tailscale ডাউনলোড করা হচ্ছে..." -ForegroundColor Cyan

              $msiPath = Join-Path `
                $env:TEMP `
                "tailscale-premium.msi"

              Invoke-WebRequest `
                -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" `
                -OutFile $msiPath `
                -UseBasicParsing

              Write-Host "│ 📦 Tailscale ইনস্টল করা হচ্ছে..." -ForegroundColor Cyan

              $process = Start-Process `
                -FilePath "msiexec.exe" `
                -ArgumentList @(
                  "/i",
                  "`"$msiPath`"",
                  "/quiet",
                  "/norestart"
                ) `
                -Wait `
                -PassThru

              Remove-Item `
                $msiPath `
                -Force `
                -ErrorAction SilentlyContinue

              if ($process.ExitCode -notin @(0, 3010)) {

                  throw "Tailscale ইনস্টল ব্যর্থ হয়েছে। Exit Code: $($process.ExitCode)"
              }

              Write-Host "│ ✅ Tailscale সফলভাবে ইনস্টল হয়েছে" -ForegroundColor Green

          } else {

              Write-Host "│ ✅ Tailscale আগে থেকেই ইনস্টল আছে" -ForegroundColor Green
          }


          # --------------------------------------------------------
          # Service ready হওয়ার অপেক্ষা
          # --------------------------------------------------------

          $ready = $false

          for ($i = 1; $i -le 30; $i++) {

              if (Test-Path $tailscaleExe) {

                  $ready = $true
                  break
              }

              Start-Sleep -Seconds 2
          }

          if (-not $ready) {

              throw "Tailscale executable পাওয়া যায়নি।"
          }


          # --------------------------------------------------------
          # Unique Hostname
          # একই Tailnet-এ পুরনো device collision এড়ায়
          # --------------------------------------------------------

          $runIdShort = "$env:GITHUB_RUN_ID"

          if ($runIdShort.Length -gt 8) {

              $runIdShort = $runIdShort.Substring(
                $runIdShort.Length - 8
              )
          }

          $hostname = "ai-stv-$runIdShort"

          "TAILSCALE_HOSTNAME=$hostname" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append


          # --------------------------------------------------------
          # Connect
          # --------------------------------------------------------

          Write-Host "│ 🔗 Tailscale সংযোগ করা হচ্ছে..." -ForegroundColor Cyan

          & $tailscaleExe up `
            --authkey="$env:TAILSCALE_AUTH_KEY" `
            --hostname="$hostname" `
            --accept-routes `
            --accept-dns `
            --reset

          if ($LASTEXITCODE -ne 0) {

              throw "Tailscale সংযোগ ব্যর্থ হয়েছে।"
          }

          Write-Host "│ ✅ Tailscale সংযোগ সফল" -ForegroundColor Green


          # --------------------------------------------------------
          # IP সংগ্রহ
          # --------------------------------------------------------

          Write-Host "│ 🔎 Tailscale IPv4 নেওয়া হচ্ছে..." -ForegroundColor Cyan

          $ip = $null

          for ($i = 1; $i -le 30; $i++) {

              $candidate = (
                & $tailscaleExe ip -4 2>$null |
                Select-Object -First 1
              )

              if ($candidate) {

                  $candidate = $candidate.Trim()

                  if ($candidate -match '^\d{1,3}(\.\d{1,3}){3}$') {

                      $ip = $candidate
                      break
                  }
              }

              Write-Host "│ ⏳ IP-এর জন্য অপেক্ষা... ($i/30)" -ForegroundColor DarkGray

              Start-Sleep -Seconds 2
          }

          if (-not $ip) {

              throw "Tailscale IPv4 পাওয়া যায়নি।"
          }

          "TAILSCALE_IP=$ip" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          Write-Host ""
          Write-Host "│ ✅ Tailscale IP: $ip" -ForegroundColor Green
          Write-Host "│ ✅ Hostname: $hostname" -ForegroundColor Green

          Write-Host ""
          Write-Host "🎯 নেটওয়ার্ক সেটআপ সম্পন্ন!" -ForegroundColor Green


      # ============================================================
      # ৭. Final Network Test
      # ============================================================

      - name: 🧪 সংযোগ পরীক্ষা করুন
        shell: powershell

        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "🧪 চূড়ান্ত সংযোগ পরীক্ষা করা হচ্ছে..." -ForegroundColor Yellow
          Write-Host ""

          $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $tailscaleExe)) {

              throw "Tailscale executable পাওয়া যায়নি।"
          }

          $status = & $tailscaleExe status 2>&1

          if ($LASTEXITCODE -ne 0) {

              throw "Tailscale status পরীক্ষা ব্যর্থ হয়েছে।"
          }

          Write-Host "│ ✅ Tailscale সক্রিয়" -ForegroundColor Green


          $service = Get-Service `
            -Name TermService `
            -ErrorAction Stop

          if ($service.Status -ne "Running") {

              Start-Service `
                -Name TermService `
                -ErrorAction Stop
          }

          Write-Host "│ ✅ RDP Service সক্রিয়" -ForegroundColor Green


          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_IP)) {

              throw "Tailscale IP environment variable পাওয়া যায়নি।"
          }

          Write-Host "│ ✅ IP ঠিকানা প্রস্তুত" -ForegroundColor Green

          Write-Host ""
          Write-Host "🎯 সব পরীক্ষা সফল!" -ForegroundColor Green


      # ============================================================
      # ৮. Connection Information
      # ============================================================

      - name: 🎉 সংযোগ তথ্য
        shell: powershell

        run: |
          $ErrorActionPreference = "Stop"

          $durationInput = "${{ github.event.inputs.duration }}"

          switch ($durationInput) {

              "1h" {

                  $totalMinutes = 60
                  $displayTime  = "১ ঘণ্টা"
              }

              "3h" {

                  $totalMinutes = 180
                  $displayTime  = "৩ ঘণ্টা"
              }

              "5h" {

                  $totalMinutes = 300
                  $displayTime  = "৫ ঘণ্টা"
              }

              "5h40m" {

                  $totalMinutes = 340
                  $displayTime  = "৫ ঘণ্টা ৪০ মিনিট"
              }

              default {

                  $totalMinutes = 60
                  $displayTime  = "১ ঘণ্টা"
              }
          }


          # Bangladesh Standard Time = UTC+6
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById(
            "Bangladesh Standard Time"
          )

          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc(
            (Get-Date).ToUniversalTime(),
            $timeZone
          )

          $endTime = $startTime.AddMinutes(
            $totalMinutes
          )


          "TOTAL_MINUTES=$totalMinutes" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append


          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║             🎉 সংযোগ সফলভাবে হয়েছে!              ║" -ForegroundColor Cyan
          Write-Host "╠════════════════════════════════════════════════════╣" -ForegroundColor Cyan

          Write-Host "║ 🌐 IP ঠিকানা : $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "║ 🏠 Hostname   : $env:TAILSCALE_HOSTNAME" -ForegroundColor White
          Write-Host "║ 👤 Username   : $env:RDP_USER" -ForegroundColor White
          Write-Host "║ 🔐 Password   : $env:RDP_PASS" -ForegroundColor White
          Write-Host "║ 📍 Port       : 3389" -ForegroundColor White

          Write-Host "╠════════════════════════════════════════════════════╣" -ForegroundColor Cyan

          Write-Host "║ ⏰ সময়কাল    : $displayTime" -ForegroundColor Yellow
          Write-Host "║ 🕐 শুরু       : $($startTime.ToString('HH:mm:ss'))" -ForegroundColor Yellow
          Write-Host "║ 🕐 শেষ        : $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Yellow

          Write-Host "╠════════════════════════════════════════════════════╣" -ForegroundColor Cyan

          Write-Host "║ 💡 সংযোগের নিয়ম:" -ForegroundColor Cyan
          Write-Host "║" -ForegroundColor Cyan
          Write-Host "║ ১️⃣ Remote Desktop অ্যাপ খুলুন" -ForegroundColor Green
          Write-Host "║ ২️⃣ PC/Address-এ Tailscale IP দিন" -ForegroundColor Green
          Write-Host "║ ৩️⃣ Username দিন: $env:RDP_USER" -ForegroundColor Green
          Write-Host "║ ৪️⃣ Password দিন: $env:RDP_PASS" -ForegroundColor Green
          Write-Host "║ ৫️⃣ Connect করুন 🚀" -ForegroundColor Green

          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Cyan

          Write-Host ""
          Write-Host "💡 IP ব্যবহার করাই সবচেয়ে নির্ভরযোগ্য।" -ForegroundColor Yellow


      # ============================================================
      # ৯. Session Keep Alive
      # ============================================================

      - name: ⏳ কর্মসেশন বজায় রাখুন
        shell: powershell

        run: |
          $ErrorActionPreference = "Continue"

          $totalMinutes = [int]$env:TOTAL_MINUTES

          if ($totalMinutes -le 0) {

              $totalMinutes = 60
          }


          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById(
            "Bangladesh Standard Time"
          )

          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc(
            (Get-Date).ToUniversalTime(),
            $timeZone
          )

          $endTime = $startTime.AddMinutes(
            $totalMinutes
          )


          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║          💎 প্রিমিয়াম সেশন চালু হয়েছে            ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Magenta

          Write-Host ""
          Write-Host "🌐 IP: $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "🏠 Hostname: $env:TAILSCALE_HOSTNAME" -ForegroundColor Cyan
          Write-Host "👤 User: $env:RDP_USER" -ForegroundColor Cyan

          Write-Host ""
          Write-Host "🕐 শুরু: $($startTime.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host "🕐 শেষ: $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Green

          Write-Host ""


          $frames = @(
            '⠋','⠙','⠹','⠸','⠼',
            '⠴','⠦','⠧','⠇','⠏'
          )

          $sessionStart = Get-Date
          $lastHealthCheck = Get-Date


          while ($true) {

              $currentUtc = (Get-Date).ToUniversalTime()

              $currentTime = [System.TimeZoneInfo]::ConvertTimeFromUtc(
                $currentUtc,
                $timeZone
              )

              $remaining = $endTime - $currentTime


              if ($remaining.TotalSeconds -le 0) {

                  break
              }


              # ----------------------------------------------------
              # প্রতি ৩০ সেকেন্ডে Service Health Check
              # ----------------------------------------------------

              if (
                ((Get-Date) - $lastHealthCheck).TotalSeconds -ge 30
              ) {

                  $termService = Get-Service `
                    -Name TermService `
                    -ErrorAction SilentlyContinue

                  if (
                    $null -eq $termService -or
                    $termService.Status -ne "Running"
                  ) {

                      Write-Host ""
                      Write-Host "🔄 Remote Desktop Service পুনরায় চালু করা হচ্ছে..." -ForegroundColor Yellow

                      Start-Service `
                        -Name TermService `
                        -ErrorAction SilentlyContinue
                  }


                  $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"

                  if (Test-Path $tailscaleExe) {

                      $tsIp = (
                        & $tailscaleExe ip -4 2>$null |
                        Select-Object -First 1
                      )

                      if (-not $tsIp) {

                          Write-Host ""
                          Write-Host "⚠️ Tailscale সংযোগ যাচাই করা হচ্ছে..." -ForegroundColor Yellow
                      }
                  }

                  $lastHealthCheck = Get-Date
              }


              # ----------------------------------------------------
              # Connected RDP Sessions
              # ----------------------------------------------------

              $connections = @(
                Get-NetTCPConnection `
                  -LocalPort 3389 `
                  -State Established `
                  -ErrorAction SilentlyContinue
              )

              $connectionCount = $connections.Count


              # ----------------------------------------------------
              # Remaining Time
              # ----------------------------------------------------

              $hoursLeft = [math]::Max(
                0,
                [math]::Floor(
                  $remaining.TotalHours
                )
              )

              $minutesLeft = [math]::Max(
                0,
                [math]::Floor(
                  $remaining.TotalMinutes % 60
                )
              )

              $secondsLeft = [math]::Max(
                0,
                [math]::Floor(
                  $remaining.TotalSeconds % 60
                )
              )


              $elapsedSeconds = [int](
                (Get-Date) - $sessionStart
              ).TotalSeconds

              $frame = $frames[
                $elapsedSeconds % $frames.Length
              ]


              Write-Host `
                "`r$frame [$($currentTime.ToString('HH:mm:ss'))] বাকি: $hoursLeft ঘণ্টা $minutesLeft মিনিট $secondsLeft সেকেন্ড | RDP সংযোগ: $connectionCount   " `
                -NoNewline `
                -ForegroundColor Cyan


              Start-Sleep -Seconds 5
          }


          Write-Host ""
          Write-Host ""
          Write-Host "🎯 নির্ধারিত সময় শেষ হয়েছে।" -ForegroundColor Yellow
          Write-Host "🛑 সেশন নিরাপদভাবে বন্ধ করা হচ্ছে..." -ForegroundColor Red


      # ============================================================
      # ১০. Cleanup
      # ============================================================

      - name: 🧹 সিস্টেম পরিষ্কার করুন
        if: always()
        shell: powershell

        run: |
          $ErrorActionPreference = "Continue"

          Write-Host ""
          Write-Host "🧹 সিস্টেম পরিষ্কার করা হচ্ছে..." -ForegroundColor Yellow
          Write-Host ""


          # --------------------------------------------------------
          # Tailscale disconnect
          # --------------------------------------------------------

          try {

              $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"

              if (Test-Path $tailscaleExe) {

                  Write-Host "│ 🔌 নেটওয়ার্ক সংযোগ বন্ধ করা হচ্ছে..." -ForegroundColor Gray

                  & $tailscaleExe down 2>$null

                  Write-Host "│ ✅ নেটওয়ার্ক সংযোগ বন্ধ হয়েছে" -ForegroundColor Green
              }

          }
          catch {

              Write-Host "│ ⚠️ নেটওয়ার্ক cleanup এড়িয়ে যাওয়া হয়েছে" -ForegroundColor Yellow
          }


          # --------------------------------------------------------
          # User disable
          # --------------------------------------------------------

          try {

              $user = Get-LocalUser `
                -Name "RIYAN" `
                -ErrorAction SilentlyContinue

              if ($user) {

                  Disable-LocalUser `
                    -Name "RIYAN" `
                    -ErrorAction SilentlyContinue

                  Write-Host "│ ✅ ব্যবহারকারী নিষ্ক্রিয় করা হয়েছে" -ForegroundColor Green
              }

          }
          catch {

              Write-Host "│ ⚠️ ব্যবহারকারী cleanup এড়িয়ে যাওয়া হয়েছে" -ForegroundColor Yellow
          }


          # --------------------------------------------------------
          # Firewall cleanup
          # --------------------------------------------------------

          try {

              Remove-NetFirewallRule `
                -DisplayName "AI-STV-RDP" `
                -ErrorAction SilentlyContinue

              Write-Host "│ ✅ ফায়ারওয়াল নিয়ম সরানো হয়েছে" -ForegroundColor Green

          }
          catch {

              Write-Host "│ ⚠️ ফায়ারওয়াল cleanup এড়িয়ে যাওয়া হয়েছে" -ForegroundColor Yellow
          }


          # --------------------------------------------------------
          # Disable RDP
          # --------------------------------------------------------

          try {

              Set-ItemProperty `
                -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                -Name 'fDenyTSConnections' `
                -Value 1 `
                -Force `
                -ErrorAction SilentlyContinue

              Write-Host "│ ✅ রিমোট ডেস্কটপ বন্ধ করা হয়েছে" -ForegroundColor Green

          }
          catch {

              Write-Host "│ ⚠️ RDP cleanup এড়িয়ে যাওয়া হয়েছে" -ForegroundColor Yellow
          }


          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║        🎉 পরিষ্কার সফলভাবে সম্পন্ন!          ║" -ForegroundColor Green
          Write-Host "║              আবার দেখা হবে 👋               ║" -ForegroundColor Green
          Write-Host "╚══════════════════════════════════════════════╝" -ForegroundColor Green
