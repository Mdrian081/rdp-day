name: AI STV Premium RDP

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'ব্যবহারের সময়কাল'
        required: true
        default: '5h40m'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h'
          - '5h40m'

jobs:
  Premium-RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 355

    steps:

      - name: সিস্টেম চালু করুন
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "AI STV PREMIUM RDP SERVER" -ForegroundColor Cyan
          Write-Host "সিস্টেম প্রস্তুত করা হচ্ছে..." -ForegroundColor Yellow
          Start-Sleep -Seconds 2
          Write-Host "সিস্টেম প্রস্তুত!" -ForegroundColor Green


      - name: প্রয়োজনীয় তথ্য যাচাই করুন
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "প্রয়োজনীয় তথ্য যাচাই করা হচ্ছে..." -ForegroundColor Yellow

          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_AUTH_KEY)) {
              Write-Host "TAILSCALE_AUTH_KEY পাওয়া যায়নি!" -ForegroundColor Red
              Write-Host "Repository Settings > Secrets and variables > Actions এ TAILSCALE_AUTH_KEY যোগ করুন।" -ForegroundColor Yellow
              exit 1
          }

          Write-Host "Tailscale Auth Key পাওয়া গেছে।" -ForegroundColor Green
          Write-Host "যাচাই সম্পন্ন!" -ForegroundColor Green


      - name: সিস্টেম কনফিগারেশন
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "RDP সিস্টেম কনফিগার করা হচ্ছে..." -ForegroundColor Yellow

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name 'fDenyTSConnections' `
            -Value 0 `
            -Force

          Write-Host "Remote Desktop চালু হয়েছে।" -ForegroundColor Green

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name 'UserAuthentication' `
            -Value 0 `
            -Force

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name 'SecurityLayer' `
            -Value 0 `
            -Force

          Write-Host "RDP সেটিংস কনফিগার হয়েছে।" -ForegroundColor Green

          Remove-NetFirewallRule `
            -DisplayName "AI-STV-RDP" `
            -ErrorAction SilentlyContinue

          New-NetFirewallRule `
            -DisplayName "AI-STV-RDP" `
            -Direction Inbound `
            -Protocol TCP `
            -LocalPort 3389 `
            -Action Allow `
            -Profile Any | Out-Null

          Write-Host "Firewall Port 3389 চালু হয়েছে।" -ForegroundColor Green

          Set-Service `
            -Name TermService `
            -StartupType Automatic

          Start-Service `
            -Name TermService `
            -ErrorAction SilentlyContinue

          Set-Service `
            -Name UmRdpService `
            -StartupType Automatic `
            -ErrorAction SilentlyContinue

          Start-Service `
            -Name UmRdpService `
            -ErrorAction SilentlyContinue

          $service = Get-Service -Name TermService

          if ($service.Status -ne "Running") {
              throw "Remote Desktop Service চালু হয়নি।"
          }

          Write-Host "Remote Desktop Service চলছে।" -ForegroundColor Green
          Write-Host "সিস্টেম কনফিগারেশন সম্পন্ন!" -ForegroundColor Green


      - name: প্রিমিয়াম অ্যাকাউন্ট তৈরি করুন
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "প্রিমিয়াম অ্যাকাউন্ট তৈরি করা হচ্ছে..." -ForegroundColor Yellow

          $username = "RIYAN"
          $password = "Riyan@212"

          $existingUser = Get-LocalUser `
            -Name $username `
            -ErrorAction SilentlyContinue

          if ($null -ne $existingUser) {
              Remove-LocalUser `
                -Name $username `
                -ErrorAction Stop

              Start-Sleep -Seconds 2

              Write-Host "পুরনো ব্যবহারকারী মুছে ফেলা হয়েছে।" -ForegroundColor Green
          }

          $securePass = ConvertTo-SecureString `
            -String $password `
            -AsPlainText `
            -Force

          New-LocalUser `
            -Name $username `
            -Password $securePass `
            -AccountNeverExpires `
            -PasswordNeverExpires `
            -Description "AI STV Premium RDP Account" `
            -ErrorAction Stop | Out-Null

          Write-Host "নতুন ব্যবহারকারী তৈরি হয়েছে।" -ForegroundColor Green

          Add-LocalGroupMember `
            -Group "Administrators" `
            -Member $username `
            -ErrorAction SilentlyContinue

          Add-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -Member $username `
            -ErrorAction SilentlyContinue

          Enable-LocalUser `
            -Name $username `
            -ErrorAction Stop

          $checkUser = Get-LocalUser `
            -Name $username `
            -ErrorAction Stop

          if (-not $checkUser.Enabled) {
              throw "RIYAN অ্যাকাউন্ট সক্রিয় করা যায়নি।"
          }

          "RDP_USER=$username" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          "RDP_PASS=$password" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          Write-Host "Administrator অনুমতি দেওয়া হয়েছে।" -ForegroundColor Green
          Write-Host "Remote Desktop অনুমতি দেওয়া হয়েছে।" -ForegroundColor Green
          Write-Host "অ্যাকাউন্ট প্রস্তুত!" -ForegroundColor Green


      - name: সিস্টেম অনুমতি যাচাই করুন
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "সিস্টেম যাচাই করা হচ্ছে..." -ForegroundColor Yellow

          $user = Get-LocalUser `
            -Name $env:RDP_USER `
            -ErrorAction Stop

          if (-not $user.Enabled) {
              throw "RIYAN ব্যবহারকারী সক্রিয় নয়।"
          }

          Write-Host "RIYAN ব্যবহারকারী সক্রিয়।" -ForegroundColor Green

          $adminMember = Get-LocalGroupMember `
            -Group "Administrators" |
            Where-Object {
                $_.Name -like "*\$env:RDP_USER"
            }

          if ($null -eq $adminMember) {
              throw "Administrator অনুমতি নেই।"
          }

          Write-Host "Administrator অনুমতি আছে।" -ForegroundColor Green

          $rdpMember = Get-LocalGroupMember `
            -Group "Remote Desktop Users" |
            Where-Object {
                $_.Name -like "*\$env:RDP_USER"
            }

          if ($null -eq $rdpMember) {
              throw "Remote Desktop অনুমতি নেই।"
          }

          Write-Host "Remote Desktop অনুমতি আছে।" -ForegroundColor Green

          $termService = Get-Service `
            -Name TermService `
            -ErrorAction Stop

          if ($termService.Status -ne "Running") {
              Start-Service `
                -Name TermService `
                -ErrorAction Stop
          }

          Write-Host "Remote Desktop Service চলছে।" -ForegroundColor Green
          Write-Host "সিস্টেম যাচাই সম্পন্ন!" -ForegroundColor Green


      - name: প্রিমিয়াম নেটওয়ার্ক সেটআপ করুন
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "Tailscale নেটওয়ার্ক সেটআপ করা হচ্ছে..." -ForegroundColor Yellow

          $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $tailscaleExe)) {

              $msiPath = "$env:TEMP\tailscale.msi"

              Write-Host "Tailscale ডাউনলোড করা হচ্ছে..." -ForegroundColor Cyan

              Invoke-WebRequest `
                -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" `
                -OutFile $msiPath

              Write-Host "Tailscale ইনস্টল করা হচ্ছে..." -ForegroundColor Cyan

              $install = Start-Process `
                -FilePath "msiexec.exe" `
                -ArgumentList "/i `"$msiPath`" /quiet /norestart" `
                -Wait `
                -PassThru

              Remove-Item `
                -Path $msiPath `
                -Force `
                -ErrorAction SilentlyContinue

              if ($install.ExitCode -ne 0 -and $install.ExitCode -ne 3010) {
                  throw "Tailscale ইনস্টল ব্যর্থ হয়েছে। Exit Code: $($install.ExitCode)"
              }

              Start-Sleep -Seconds 10
          }

          if (-not (Test-Path $tailscaleExe)) {
              throw "Tailscale পাওয়া যায়নি।"
          }

          Write-Host "Tailscale ইনস্টল হয়েছে।" -ForegroundColor Green

          $runId = "$env:GITHUB_RUN_ID"

          if ($runId.Length -gt 8) {
              $runId = $runId.Substring($runId.Length - 8)
          }

          $hostname = "ai-stv-$runId"

          Write-Host "Tailscale সংযোগ করা হচ্ছে..." -ForegroundColor Cyan

          & $tailscaleExe up `
            --authkey="$env:TAILSCALE_AUTH_KEY" `
            --hostname="$hostname" `
            --accept-dns `
            --reset

          if ($LASTEXITCODE -ne 0) {
              throw "Tailscale সংযোগ ব্যর্থ হয়েছে।"
          }

          $ip = $null

          for ($i = 0; $i -lt 30; $i++) {

              $candidate = & $tailscaleExe ip -4 2>$null |
                Select-Object -First 1

              if ($candidate) {

                  $candidate = $candidate.Trim()

                  if ($candidate -match '^\d{1,3}(\.\d{1,3}){3}$') {
                      $ip = $candidate
                      break
                  }
              }

              Write-Host "IP ঠিকানার জন্য অপেক্ষা করা হচ্ছে..." -ForegroundColor Yellow
              Start-Sleep -Seconds 2
          }

          if ([string]::IsNullOrWhiteSpace($ip)) {
              throw "Tailscale IP পাওয়া যায়নি।"
          }

          "TAILSCALE_IP=$ip" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          "TAILSCALE_HOSTNAME=$hostname" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          Write-Host "Tailscale সংযোগ সফল!" -ForegroundColor Green
          Write-Host "IP: $ip" -ForegroundColor Cyan
          Write-Host "Hostname: $hostname" -ForegroundColor Cyan


      - name: সংযোগ পরীক্ষা করুন
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "চূড়ান্ত সংযোগ পরীক্ষা করা হচ্ছে..." -ForegroundColor Yellow

          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_IP)) {
              throw "Tailscale IP পাওয়া যায়নি।"
          }

          $service = Get-Service `
            -Name TermService `
            -ErrorAction Stop

          if ($service.Status -ne "Running") {
              Start-Service `
                -Name TermService `
                -ErrorAction Stop
          }

          Write-Host "RDP Service: OK" -ForegroundColor Green
          Write-Host "Tailscale IP: $env:TAILSCALE_IP" -ForegroundColor Green
          Write-Host "সংযোগ পরীক্ষা সফল!" -ForegroundColor Green


      - name: সংযোগ তথ্য
        shell: powershell
        run: |
          $durationInput = "${{ github.event.inputs.duration }}"

          switch ($durationInput) {
              "1h" {
                  $totalMinutes = 60
                  $displayTime = "১ ঘণ্টা"
              }

              "3h" {
                  $totalMinutes = 180
                  $displayTime = "৩ ঘণ্টা"
              }

              "5h" {
                  $totalMinutes = 300
                  $displayTime = "৫ ঘণ্টা"
              }

              "5h40m" {
                  $totalMinutes = 340
                  $displayTime = "৫ ঘণ্টা ৪০ মিনিট"
              }

              default {
                  $totalMinutes = 60
                  $displayTime = "১ ঘণ্টা"
              }
          }

          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById(
              "Bangladesh Standard Time"
          )

          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc(
              (Get-Date).ToUniversalTime(),
              $timeZone
          )

          $endTime = $startTime.AddMinutes($totalMinutes)

          "TOTAL_MINUTES=$totalMinutes" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          Write-Host ""
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host "       AI STV PREMIUM RDP READY" -ForegroundColor Green
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "IP ঠিকানা : $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "Hostname   : $env:TAILSCALE_HOSTNAME" -ForegroundColor White
          Write-Host "Username   : $env:RDP_USER" -ForegroundColor White
          Write-Host "Password   : $env:RDP_PASS" -ForegroundColor White
          Write-Host "Port       : 3389" -ForegroundColor White
          Write-Host ""
          Write-Host "সময়কাল     : $displayTime" -ForegroundColor Yellow
          Write-Host "শুরু        : $($startTime.ToString('HH:mm:ss'))" -ForegroundColor Yellow
          Write-Host "শেষ         : $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Remote Desktop অ্যাপে উপরের IP ব্যবহার করুন।" -ForegroundColor Green
          Write-Host "============================================" -ForegroundColor Cyan


      - name: কর্মসেশন বজায় রাখুন
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          $totalMinutes = [int]$env:TOTAL_MINUTES

          if ($totalMinutes -le 0) {
              $totalMinutes = 60
          }

          $endTime = (Get-Date).AddMinutes($totalMinutes)
          $lastStatus = Get-Date

          Write-Host ""
          Write-Host "প্রিমিয়াম RDP সেশন চালু হয়েছে।" -ForegroundColor Green
          Write-Host "IP: $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "User: $env:RDP_USER" -ForegroundColor Cyan
          Write-Host ""

          while ((Get-Date) -lt $endTime) {

              $now = Get-Date
              $remaining = $endTime - $now

              $service = Get-Service `
                -Name TermService `
                -ErrorAction SilentlyContinue

              if ($null -ne $service) {

                  if ($service.Status -ne "Running") {

                      Write-Host ""
                      Write-Host "RDP Service পুনরায় চালু করা হচ্ছে..." -ForegroundColor Yellow

                      Start-Service `
                        -Name TermService `
                        -ErrorAction SilentlyContinue
                  }
              }

              if (($now - $lastStatus).TotalMinutes -ge 2) {

                  $connections = @(
                      Get-NetTCPConnection `
                        -LocalPort 3389 `
                        -State Established `
                        -ErrorAction SilentlyContinue
                  )

                  $hoursLeft = [math]::Floor(
                      $remaining.TotalHours
                  )

                  $minutesLeft = [math]::Floor(
                      $remaining.TotalMinutes % 60
                  )

                  Write-Host ""
                  Write-Host "সার্ভার চলছে | বাকি: $hoursLeft ঘণ্টা $minutesLeft মিনিট | RDP সংযোগ: $($connections.Count)" -ForegroundColor Cyan

                  $lastStatus = $now
              }

              Start-Sleep -Seconds 30
          }

          Write-Host ""
          Write-Host "নির্ধারিত সময় শেষ হয়েছে।" -ForegroundColor Yellow


      - name: সিস্টেম পরিষ্কার করুন
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host ""
          Write-Host "সিস্টেম পরিষ্কার করা হচ্ছে..." -ForegroundColor Yellow

          $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (Test-Path $tailscaleExe) {

              Write-Host "Tailscale সংযোগ বন্ধ করা হচ্ছে..." -ForegroundColor Gray

              & $tailscaleExe down

              Write-Host "Tailscale বন্ধ করা হয়েছে।" -ForegroundColor Green
          }

          $user = Get-LocalUser `
            -Name "RIYAN" `
            -ErrorAction SilentlyContinue

          if ($null -ne $user) {

              Disable-LocalUser `
                -Name "RIYAN" `
                -ErrorAction SilentlyContinue

              Write-Host "RIYAN অ্যাকাউন্ট নিষ্ক্রিয় করা হয়েছে।" -ForegroundColor Green
          }

          Remove-NetFirewallRule `
            -DisplayName "AI-STV-RDP" `
            -ErrorAction SilentlyContinue

          Write-Host "Firewall rule সরানো হয়েছে।" -ForegroundColor Green

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name 'fDenyTSConnections' `
            -Value 1 `
            -Force `
            -ErrorAction SilentlyContinue

          Write-Host "RDP বন্ধ করা হয়েছে।" -ForegroundColor Green
          Write-Host ""
          Write-Host "Cleanup সম্পন্ন।" -ForegroundColor Green
